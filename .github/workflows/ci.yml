name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  js:
    name: JS — lint, types, unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint:js
      - run: npm run lint:style
      - run: npm run check-types
      # Jest suites land in Phase 1 (contrast utils); --passWithNoTests
      # keeps this green until then.
      - run: npm run test:unit
      - name: Build
        run: npm run build
      - name: Upload build for Plugin Check
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: build/
          if-no-files-found: ignore

  php:
    name: PHP — coding standards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.0'
          coverage: none
          tools: composer
      - run: composer install --no-interaction --no-progress
      - run: composer run lint:php

  plugin-check:
    name: Plugin Check
    runs-on: ubuntu-latest
    needs: js
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: build
          path: build/
        continue-on-error: true
      - name: Run Plugin Check
        uses: wordpress/plugin-check-action@v1
        with:
          build-dir: '.'

  # Phase 2+: PHPUnit (dynamic render tests) — added when the first
  # dynamic block lands, using wp-env for a WordPress test environment.
  #
  # Phase 3+: Playwright editor E2E (@wordpress/e2e-test-utils-playwright).
