name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  js:
    name: JS — lint, types, unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint:js
      - run: npm run lint:style
      - run: npm run check-types
      # Jest suites land in Phase 1 (contrast utils); --passWithNoTests
      # keeps this green until then.
      - run: npm run test:unit
      - name: Build
        run: npm run build
      - name: Upload build for Plugin Check
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: build/
          if-no-files-found: ignore

  php:
    name: PHP — coding standards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          # Dev tooling runs on current PHP (the lockfile resolves against
          # it); the plugin's PHP 8.0 floor is enforced by the
          # PHPCompatibilityWP sniffs in phpcs.xml.dist.
          php-version: '8.4'
          coverage: none
          tools: composer
      - run: composer install --no-interaction --no-progress
      - run: composer run lint:php
      - run: composer run test:php

  plugin-check:
    name: Plugin Check
    runs-on: ubuntu-latest
    needs: js
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: build
          path: build/
        continue-on-error: true
      - name: Stage distributable plugin
        # Plugin Check must see what ships to WordPress.org — not dev
        # files (tests, configs). Mirrors the plugin-zip file list, which
        # includes src/ so the uncompiled TS/SCSS ships alongside build/
        # (WordPress.org source-access requirement).
        # The directory name becomes the plugin slug Plugin Check validates
        # against, so it must match the text domain.
        run: |
          mkdir -p dist/guardrail-blocks
          cp -r guardrail-blocks.php readme.txt includes build src package.json tsconfig.json dist/guardrail-blocks/
      - name: Run Plugin Check
        uses: wordpress/plugin-check-action@v1
        with:
          build-dir: './dist/guardrail-blocks'

  e2e:
    name: E2E — Playwright + wp-env
    runs-on: ubuntu-latest
    needs: js
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Start WordPress (wp-env)
        run: npm run env:start
      - name: Run E2E tests
        run: npm run test:e2e
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: artifacts/
          if-no-files-found: ignore
